version: '3.8'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./Backend:/app
      - /app/node_modules
    env_file:
      - ./Backend/.env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  ml_vision:
    build:
      context: ./Feature3
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./Feature3:/app
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - backend

  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sankalp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sankalp_password}
      POSTGRES_DB: ${POSTGRES_DB:-sankalp_db}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./Backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sankalp_user} -d ${POSTGRES_DB:-sankalp_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
